server:
  port: 8080

spring:
  application:
    name: sync-server

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/sync_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:sync_user}
    password: ${DB_PASSWORD:sync123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}

# WebSocket 配置
websocket:
  path: /ws/sync

# Redis Pub/Sub channel 前缀
sync:
  channel-prefix: "space:"

# CORS 配置（生产环境）
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://record.younote.top}

# 日志配置
logging:
  level:
    root: INFO
    com.record.sync: INFO
    org.springframework.web: WARN
    org.hibernate: WARN