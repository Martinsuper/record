server:
  port: 8080

spring:
  application:
    name: time-record-server

  datasource:
    url: jdbc:h2:file:./data/timerecord;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: your-256-bit-secret-key-for-jwt-token-generation-must-be-long-enough
  expiration: 604800000  # 7 days in milliseconds

wechat:
  app-id: ${WECHAT_APP_ID:}
  app-secret: ${WECHAT_APP_SECRET:}

file:
  upload-dir: ./uploads